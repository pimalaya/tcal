# iCalendar timezone as TOML, edited by tcal.
#
# Fill what you need; empty fields are ignored. Other
# components and properties tcal does not model are kept
# verbatim, not shown here.

id = "America/Los_Angeles"	# Europe/Paris

[[standard]]
name = "PST"			# CET
offset-from = "-0700"		# +0200
offset-to = "-0800"		# +0100

date-start = "1970-11-01 02:00"	# local start: 1996-10-27 03:00
date-start-tz = ""		# America/New_York; empty for UTC or floating

recurrence.frequency = "yearly"	# secondly, minutely, hourly, daily, weekly, monthly, yearly
recurrence.interval = ""	# every N periods
recurrence.count = ""		# total occurrences; alternative to until
recurrence.until = ""		# 2026-06-13 14:30
recurrence.by-day = ["1su"]	# mo, tu, we, th, fr, sa, su; with an ordinal like -1su, 2mo
recurrence.by-month = [11]	# 1 to 12
recurrence.by-month-day = []	# 1 to 31, negative counts from the end (-1 = last)
recurrence.by-position = []	# nth occurrence in the period; -1 = last
recurrence.week-start = ""	# mo, tu, we, th, fr, sa, su

[[daylight]]
name = "PDT"			# CET
offset-from = "-0800"		# +0200
offset-to = "-0700"		# +0100

date-start = "1970-03-08 02:00"	# local start: 1996-10-27 03:00
date-start-tz = ""		# America/New_York; empty for UTC or floating

recurrence.frequency = "yearly"	# secondly, minutely, hourly, daily, weekly, monthly, yearly
recurrence.interval = ""	# every N periods
recurrence.count = ""		# total occurrences; alternative to until
recurrence.until = ""		# 2026-06-13 14:30
recurrence.by-day = ["2su"]	# mo, tu, we, th, fr, sa, su; with an ordinal like -1su, 2mo
recurrence.by-month = [3]	# 1 to 12
recurrence.by-month-day = []	# 1 to 31, negative counts from the end (-1 = last)
recurrence.by-position = []	# nth occurrence in the period; -1 = last
recurrence.week-start = ""	# mo, tu, we, th, fr, sa, su
