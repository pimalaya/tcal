# iCalendar as TOML, edited by tcal.
#
# Each component is a [[block]]; repeat a block for repeated
# components, delete one you do not need. Empty fields and empty
# blocks are ignored. Properties and component types tcal does
# not model are kept verbatim, not shown here.

[[event]]
summary = "Really long event name thing"
description = ""
categories = []
location = ""
url = ""				# https://example.com/event
organizer = ""				# email address
class = ""				# public, private, confidential
priority = ""				# 0 = undefined, 1 = highest, 9 = lowest
status = "CONFIRMED"			# confirmed, tentative, cancelled
transparency = "OPAQUE"			# opaque, transparent

date-start = "2012-06-30 06:00"		# 2026-06-13 14:30
date-start-tz = "America/Los_Angeles"	# America/New_York; empty for UTC or floating
date-end = "2012-06-30 07:00"		# 2026-06-13 14:30
date-end-tz = "America/Los_Angeles"	# America/New_York; empty for UTC or floating

duration.week = ""			# event length
duration.day = ""
duration.hour = ""
duration.min = ""
duration.sec = ""

recurrence.frequency = ""		# secondly, minutely, hourly, daily, weekly, monthly, yearly
recurrence.interval = ""		# every N periods
recurrence.count = ""			# total occurrences; alternative to until
recurrence.until = ""			# 2026-06-13 14:30
recurrence.by-day = []			# mo, tu, we, th, fr, sa, su; with an ordinal like -1su, 2mo
recurrence.by-month = []		# 1 to 12
recurrence.by-month-day = []		# 1 to 31, negative counts from the end (-1 = last)
recurrence.by-position = []		# nth occurrence in the period; -1 = last
recurrence.week-start = ""		# mo, tu, we, th, fr, sa, su

[[event.attendee]]
display-name = ""
value = ""				# email address
role = ""				# chair, req-participant, opt-participant, non-participant
status = ""				# needs-action, accepted, declined, tentative, delegated

[[event.alarm]]
summary = ""		# subject line for an email alarm
description = ""
action = ""		# display, email, audio
repeat = ""		# how many extra times to fire: 2

trigger.week = ""	# before the event
trigger.day = ""
trigger.hour = ""
trigger.min = ""
trigger.sec = ""

duration.week = ""	# with repeat
duration.day = ""
duration.hour = ""
duration.min = ""
duration.sec = ""

